<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marvel Rivals Academy Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scanlines"></div>
    <div class="grid-overlay"></div>
    
    <div class="app">
        <aside class="sidebar">
            <div class="logo">
                <h1>MARVEL RIVAL ACADEMY</h1>
            </div>
            <nav id="nav">
                <button data-cat="maps" class="active">MAPS</button>
                <button data-cat="heroes">HEROES</button>
                <button data-cat="achievements">ACHIEVEMENTS</button>
                <button data-cat="items">ITEMS</button>
                <button data-cat="battlepass">BATTLEPASS</button>
            </nav>
            <div class="sys-status">
                <span>STATUS: <span class="glow-text">ONLINE</span></span>
            </div>
        </aside>
        
        <main class="dashboard">
            <header class="dash-header">
                <div class="header-left">
                    <h2 id="cat-title">MAPS</h2>
                </div>
                <div class="scanning-anim">SCANNING...</div>
            </header>
            <div class="grid" id="grid">
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
